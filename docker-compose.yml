version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: pms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    environment:
      MONGO_INITDB_DATABASE: pms

  redis:
    image: redis:7.0-alpine
    container_name: pms-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  mongodb:
  redis:
